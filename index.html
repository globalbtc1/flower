<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="welcomeScreen">
        <button id="playBtn">Buka Pesan 💌</button>
    </div>

    <div id="mainScreen" style="display: none;">
        <p class="small-text">Send this to your loved ones</p>
        <h1>Happy Valentine's Day</h1>
        
        <div class="night"></div>
        <div class="flower">
            <div class="flower-wrapper">
                <div class="flower__line"></div>
                <div class="flower__center"></div>
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                
                <div class="flower__stem__leaf flower__stem__leaf--1"></div>
                <div class="flower__stem__leaf flower__stem__leaf--2"></div>
            </div>
        </div>
    </div>

    <!-- Ganti 'lagu.mp3' sesuai nama file audio Anda di Codespaces -->
    <audio id="bgMusic" src="lagu.mp3" loop></audio>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Layar Awal untuk memicu lagu -->
    <div id="welcomeScreen">
        <button id="playBtn">Buka Pesan 💌</button>
    </div>

    <!-- Layar Utama Animasi (disembunyikan di awal) -->
    <div id="mainScreen" style="display: none;">
        <h2>Happy Valentine's Day</h2>
        
        <!-- Struktur Bunga (Anda bisa paste elemen bunga lengkap di sini) -->
        <div class="flower">
            <div class="flower__leafs">
                <!-- ... elemen daun dan batang ... -->
            </div>
        </div>
    </div>

    <!-- File Audio (Ganti 'lagu.mp3' dengan nama file lagu Anda) -->
    <audio id="bgMusic" src="lagu.mp3" loop></audio>

    <script src="script.js"></script>
</body>
</html>

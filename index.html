<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="welcomeScreen">
        <button id="playBtn">Buka Pesan 💌</button>
    </div>

    <div id="mainScreen" style="display: none;">
        <div class="stars"></div>
        <h1 class="glow-text">Happy Valentine's Day</h1>
        
        <div class="garden">
            <!-- Rumput -->
            <div class="grass g-left1"></div><div class="grass g-left2"></div><div class="grass g-left3"></div>
            <div class="grass g-right1"></div><div class="grass g-right2"></div><div class="grass g-right3"></div>

            <!-- Bunga Kiri -->
            <div class="flower f-left">
                <div class="stem"></div>
                <div class="leaf l-left l-1"></div><div class="leaf l-right l-2"></div>
                <div class="head">
                    <div class="petal p-left"></div><div class="petal p-center"></div><div class="petal p-right"></div>
                    <div class="core"></div>
                </div>
            </div>

            <!-- Bunga Kanan -->
            <div class="flower f-right">
                <div class="stem"></div>
                <div class="leaf l-left l-3"></div><div class="leaf l-right l-4"></div>
                <div class="head">
                    <div class="petal p-left"></div><div class="petal p-center"></div><div class="petal p-right"></div>
                    <div class="core"></div>
                </div>
            </div>

            <!-- Bunga Tengah (Tertinggi) -->
            <div class="flower f-center">
                <div class="stem"></div>
                <div class="leaf l-left l-5"></div><div class="leaf l-right l-6"></div>
                <div class="leaf l-left l-7"></div><div class="leaf l-right l-8"></div>
                <div class="head">
                    <div class="petal p-left"></div><div class="petal p-center"></div><div class="petal p-right"></div>
                    <div class="core"></div>
                </div>
            </div>

            <!-- Semak Lebar Dasar -->
            <div class="bush-container">
                <div class="bush bl1"></div><div class="bush bl2"></div><div class="bush bl3"></div>
                <div class="bush bl4"></div><div class="bush bl5"></div><div class="bush bl6"></div>
                <div class="bush bl7"></div><div class="bush bl8"></div><div class="bush bl9"></div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" src="lagu.mp3" loop></audio>
    <script src="script.js"></script>
</body>
</html>

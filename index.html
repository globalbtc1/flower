    <!-- Script Animasi Membuka Halaman -->
    <script>
        document.getElementById('btnZer0').addEventListener('click', function() {
            const welcomeScreen = document.getElementById('welcomeScreen');
            
            // Menghilangkan welcome screen perlahan
            welcomeScreen.style.opacity = '0';
            welcomeScreen.style.visibility = 'hidden';
            
            // Opsional: Jika file main.js membutuhkan trigger klik untuk memutar audio,
            // baris ini berguna agar audio/animasi di main.js bisa segera dimulai.
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
            }, 800);
        });

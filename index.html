<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy New Day</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="welcomeScreen">
        <button id="playBtn">Buka Pesan 💌</button>
    </div>

    <div id="mainScreen" style="display: none;">
        <div class="stars"></div>
        <h1 class="glow-text">Happy Valentine's Day</h1>
        
        <div class="garden">
            <!-- Rumput Latar -->
            <div class="grass g1"></div>
            <div class="grass g2"></div>
            <div class="grass g3"></div>
            <div class="grass g4"></div>

            <!-- Bunga Kiri -->
            <div class="flower f-left">
                <div class="stem">
                    <div class="leaf l1"></div>
                    <div class="leaf l2"></div>
                </div>
                <div class="flower-head">
                    <div class="petal p1"></div><div class="petal p2"></div>
                    <div class="petal p3"></div><div class="petal p4"></div>
                    <div class="core"></div>
                </div>
            </div>

            <!-- Bunga Tengah -->
            <div class="flower f-center">
                <div class="stem">
                    <div class="leaf l1"></div>
                    <div class="leaf l2"></div>
                    <div class="leaf l3"></div>
                    <div class="leaf l4"></div>
                </div>
                <div class="flower-head">
                    <div class="petal p1"></div><div class="petal p2"></div>
                    <div class="petal p3"></div><div class="petal p4"></div>
                    <div class="core"></div>
                </div>
            </div>

            <!-- Bunga Kanan -->
            <div class="flower f-right">
                <div class="stem">
                    <div class="leaf l1"></div>
                    <div class="leaf l2"></div>
                    <div class="leaf l3"></div>
                </div>
                <div class="flower-head">
                    <div class="petal p1"></div><div class="petal p2"></div>
                    <div class="petal p3"></div><div class="petal p4"></div>
                    <div class="core"></div>
                </div>
            </div>

            <!-- Daun Lebat di Bawah -->
            <div class="base-leaves">
                <div class="b-leaf bl1"></div>
                <div class="b-leaf bl2"></div>
                <div class="b-leaf bl3"></div>
                <div class="b-leaf bl4"></div>
                <div class="b-leaf bl5"></div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" src="lagu.mp3" loop></audio>
    <script src="script.js"></script>
</body>
</html>
</body>
</html>

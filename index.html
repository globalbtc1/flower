    <!-- CSS Tambahan Khusus untuk Header Premium -->
    <style>
        .premium-header {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 2.2rem;
            color: #ffffff;
            font-weight: 300;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(0, 255, 128, 0.6), 0 0 30px rgba(0, 255, 128, 0.4);
            z-index: 100;
            opacity: 0; 
            text-align: center;
            width: 100%;
            pointer-events: none; /* Agar tidak menghalangi klik elemen lain */
        }

        /* Class ini ditambahkan via JavaScript saat tombol diklik */
        .animate-header {
            animation: modernFadeFloat 3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes modernFadeFloat {
            0% {
                opacity: 0;
                transform: translate(-50%, 30px);
                letter-spacing: 2px;
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, 0);
                letter-spacing: 8px;
                filter: blur(0px);
            }
        }
    </style>
</head>

    <!-- Script Animasi Interaksi -->
    <script>
        document.getElementById('btnZer0').addEventListener('click', function() {
            const welcomeScreen = document.getElementById('welcomeScreen');
            const mainHeader = document.getElementById('mainHeader');
            
            // Sembunyikan layar awal
            welcomeScreen.style.opacity = '0';
            welcomeScreen.style.visibility = 'hidden';
            
            // Hapus layar dari flow dokumen setelah transisi selesai, 
            // lalu jalankan animasi teks Premium Header
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                mainHeader.classList.add('animate-header');
            }, 800);
        });
